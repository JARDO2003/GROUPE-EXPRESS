<!-- ============================================================
     BOUTON "ACTIVER LES NOTIFICATIONS" — À COLLER SUR VOTRE SITE
     ============================================================
     Instructions :
     1. Copiez le bloc <style> dans votre CSS (ou dans le <head>)
     2. Copiez le bloc HTML là où vous voulez le bouton
     3. Copiez le bloc <script> juste avant </body>
     4. Copiez firebase-messaging-sw.js à la racine de votre site
     ============================================================ -->


<!-- ── 1. STYLES DU BOUTON (à mettre dans votre CSS ou <head>) ── -->
<style>
  .notif-btn-wrapper {
    display: inline-flex;
    align-items: center;
  }

  #notif-subscribe-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 12px 22px;
    background: linear-gradient(135deg, #1d4ed8, #0891b2);
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.01em;
    box-shadow: 0 4px 14px rgba(29,78,216,0.35);
  }

  #notif-subscribe-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(29,78,216,0.45);
  }

  #notif-subscribe-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  #notif-subscribe-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #notif-subscribe-btn.active {
    background: linear-gradient(135deg, #059669, #10b981);
    box-shadow: 0 4px 14px rgba(5,150,105,0.35);
  }

  #notif-subscribe-btn.active:hover:not(:disabled) {
    box-shadow: 0 8px 24px rgba(5,150,105,0.45);
  }

  .notif-btn-icon {
    font-size: 1rem;
    line-height: 1;
  }

  .notif-btn-spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: _notif_spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes _notif_spin { to { transform: rotate(360deg); } }

  /* Mini toast de feedback */
  #notif-toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #111827;
    border: 1px solid #1f2d45;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 0.82rem;
    font-weight: 500;
    color: #e2e8f0;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    max-width: 320px;
  }

  #notif-toast.show { transform: translateY(0); opacity: 1; }
  #notif-toast.success { border-color: #10b981; color: #10b981; }
  #notif-toast.error   { border-color: #ef4444; color: #ef4444; }
  #notif-toast.info    { border-color: #3b82f6; color: #3b82f6; }
</style>


<!-- ── 2. HTML DU BOUTON (collez-le là où vous voulez l'afficher) ── -->
<div class="notif-btn-wrapper">
  <button id="notif-subscribe-btn" onclick="notifSubscribe()">
    <span class="notif-btn-icon">🔔</span>
    <span id="notif-btn-label">Activer les notifications</span>
  </button>
</div>

<!-- Toast feedback -->
<div id="notif-toast"></div>


<!-- ── 3. SCRIPT (à coller juste avant </body>) ── -->
<script type="module">
  import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getMessaging, getToken } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';
  import { getDatabase, ref, set }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  /* ─── CONFIG FIREBASE ─── */
  const firebaseConfig = {
    apiKey: "AIzaSyCPGgtXoDUycykLaTSee0S0yY0tkeJpqKI",
    authDomain: "data-com-a94a8.firebaseapp.com",
    databaseURL: "https://data-com-a94a8-default-rtdb.firebaseio.com",
    projectId: "data-com-a94a8",
    storageBucket: "data-com-a94a8.firebasestorage.app",
    messagingSenderId: "276904640935",
    appId: "1:276904640935:web:9cd805aeba6c34c767f682",
  };

  /* Clé VAPID de votre projet Firebase */
  const VAPID_KEY = "BLrbso554YWcAd7-QPbzRFMUpJ9obsdJitRiFtzr-VU4GArr8ariq1l9klHxFUjSzASpkoelaTDAzcvI7UIWLZ8";

  /* ─── INIT ─── */
  const fbApp = initializeApp(firebaseConfig);
  const messaging = getMessaging(fbApp);
  const db = getDatabase(fbApp);

  /* ─── HELPERS UI ─── */
  function setBtn(state) {
    const btn   = document.getElementById('notif-subscribe-btn');
    const label = document.getElementById('notif-btn-label');

    if (state === 'loading') {
      btn.disabled = true;
      btn.innerHTML = '<div class="notif-btn-spinner"></div><span>Activation…</span>';
    } else if (state === 'active') {
      btn.disabled = true;
      btn.classList.add('active');
      btn.innerHTML = '<span class="notif-btn-icon">✅</span><span id="notif-btn-label">Notifications activées</span>';
    } else if (state === 'denied') {
      btn.disabled = true;
      btn.style.background = '#374151';
      btn.style.boxShadow = 'none';
      btn.innerHTML = '<span class="notif-btn-icon">🔕</span><span>Notifications bloquées</span>';
    } else {
      // idle
      btn.disabled = false;
      btn.innerHTML = '<span class="notif-btn-icon">🔔</span><span id="notif-btn-label">Activer les notifications</span>';
    }
  }

  function showToast(message, type = 'info') {
    const el = document.getElementById('notif-toast');
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
    el.className = `show ${type}`;
    setTimeout(() => { el.className = ''; }, 4000);
  }

  /* ─── FONCTION PRINCIPALE ─── */
  window.notifSubscribe = async function() {
    setBtn('loading');

    /* 1. Service Worker */
    if (!('serviceWorker' in navigator)) {
      showToast('Votre navigateur ne supporte pas les notifications.', 'error');
      setBtn('idle');
      return;
    }

    try {
      await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    } catch(e) {
      showToast('Erreur d\'installation du service worker.', 'error');
      setBtn('idle');
      return;
    }

    /* 2. Demande de permission */
    const permission = await Notification.requestPermission();

    if (permission === 'denied') {
      showToast('Notifications bloquées. Modifiez les paramètres de votre navigateur.', 'error');
      setBtn('denied');
      return;
    }

    if (permission !== 'granted') {
      showToast('Permission non accordée.', 'error');
      setBtn('idle');
      return;
    }

    /* 3. Récupération du token FCM */
    try {
      const token = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (!token) throw new Error('Token vide');

      /* 4. Enregistrement en base de données */
      const key = token.slice(-24);
      await set(ref(db, `fcm_tokens/${key}`), {
        token,
        name: 'Visiteur ' + new Date().toLocaleDateString('fr-FR'),
        ua: navigator.userAgent.slice(0, 80),
        updatedAt: Date.now(),
      });

      setBtn('active');
      showToast('Vous recevrez désormais nos notifications !', 'success');

    } catch(e) {
      console.error('[Notif] Erreur :', e);
      showToast('Une erreur est survenue. Réessayez.', 'error');
      setBtn('idle');
    }
  };

  /* ─── ÉTAT INITIAL ─── */
  // Si déjà accordé, on tente de récupérer le token silencieusement
  if (Notification.permission === 'granted') {
    navigator.serviceWorker.register('/firebase-messaging-sw.js').then(async () => {
      try {
        const token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (token) {
          const key = token.slice(-24);
          await set(ref(db, `fcm_tokens/${key}`), {
            token,
            name: 'Visiteur ' + new Date().toLocaleDateString('fr-FR'),
            ua: navigator.userAgent.slice(0, 80),
            updatedAt: Date.now(),
          });
          setBtn('active');
        }
      } catch(_) {}
    }).catch(() => {});
  } else if (Notification.permission === 'denied') {
    setBtn('denied');
  }
</script>
