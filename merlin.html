<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bouton Notifications — Groupe Express</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a14;
    }

    /* ════════════════════════════════════════
       SCÈNE PRINCIPALE
    ════════════════════════════════════════ */
    #notif-scene {
      width: 100%;
      max-width: 600px;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 30px 40px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      border-radius: 28px;
      box-shadow: 0 40px 120px rgba(108,99,255,0.25);
    }

    /* ─── Étoiles ─── */
    .stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* ─── Anneaux ─── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      animation: pulse-ring var(--rd, 6s) ease-in-out infinite var(--rdelay, 0s);
    }
    @keyframes pulse-ring {
      0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.4; }
      50%       { transform: translate(-50%,-50%) scale(1.08); opacity: 0.08; }
    }

    /* ─── Titre / Sous-titre ─── */
    .notif-title {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      z-index: 10;
      position: relative;
      letter-spacing: 0.02em;
    }
    .notif-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 38px;
      z-index: 10;
      position: relative;
    }

    /* ─── Bouton principal ─── */
    #notif-subscribe-btn {
      font-family: 'Poppins', sans-serif;
      position: relative;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 48px;
      background: linear-gradient(135deg, #6c63ff, #3ec6e0, #ff6584);
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(108,99,255,0.6), 0 0 80px rgba(62,198,224,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }
    #notif-subscribe-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: 50px;
    }
    #notif-subscribe-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 0 60px rgba(108,99,255,0.9), 0 0 120px rgba(62,198,224,0.4);
    }
    #notif-subscribe-btn:active:not(:disabled) { transform: scale(0.97); }
    #notif-subscribe-btn:disabled { cursor: not-allowed; }
    #notif-subscribe-btn.success-state {
      background: linear-gradient(135deg, #00c9a7, #00e676);
      background-size: 200% 200%;
      box-shadow: 0 0 40px rgba(0,201,167,0.6), 0 0 80px rgba(0,230,118,0.3);
    }
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bell-icon {
      font-size: 1.3rem;
      animation: bell-shake 2.5s ease infinite;
      display: inline-block;
    }
    @keyframes bell-shake {
      0%, 80%, 100% { transform: rotate(0); }
      85%  { transform: rotate(18deg); }
      90%  { transform: rotate(-16deg); }
      95%  { transform: rotate(12deg); }
      98%  { transform: rotate(-8deg); }
    }

    /* ─── Spinner ─── */
    .notif-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Ripple ─── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-out 0.7s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-out { to { transform: scale(6); opacity: 0; } }

    /* ─── Particules ─── */
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 30;
      animation: particle-fly var(--dur, 1s) ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx,60px), var(--ty,-80px)) scale(0); opacity: 0; }
    }

    /* ─── Statut ─── */
    #notif-status {
      margin-top: 20px;
      z-index: 10;
      position: relative;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      min-height: 20px;
      text-align: center;
      transition: all 0.4s ease;
    }

    /* ─── Personnage petite fille ─── */
    #girl-container {
      position: absolute;
      bottom: -200px;
      right: 36px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: bottom 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    #girl-container.show { bottom: 8px; }

    /* ─── Bulle de dialogue ─── */
    #speech-bubble {
      background: rgba(255,255,255,0.97);
      border-radius: 20px 20px 4px 20px;
      padding: 14px 18px;
      max-width: 230px;
      font-size: 0.72rem;
      line-height: 1.55;
      color: #2d2d2d;
      margin-bottom: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      opacity: 0;
      transform: scale(0.7) translateY(12px);
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.35s;
    }
    #speech-bubble.show { opacity: 1; transform: scale(1) translateY(0); }
    #speech-bubble .bubble-name {
      font-weight: 700;
      font-size: 0.78rem;
      color: #6c63ff;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ─── Barres audio ─── */
    .wave-bars {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .wave-bar {
      width: 2px; height: 3px;
      border-radius: 2px;
      background: #6c63ff;
      animation: wave-bounce 0.7s ease-in-out infinite;
      animation-play-state: paused;
    }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.15s; }
    @keyframes wave-bounce {
      0%, 100% { height: 3px; }
      50%       { height: 10px; }
    }
    .wave-bars.speaking .wave-bar { animation-play-state: running; }

    /* ─── SVG fille ─── */
    #girl-svg {
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
      animation: girl-float 3s ease-in-out infinite;
    }
    @keyframes girl-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* ─── Toast ─── */
    #notif-toast {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #fff;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
      white-space: nowrap;
    }
    #notif-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
